---
version: 2

snapshot:
  version_template: "{{ .Version }}-next"

builds:
  - id: "dreadgoad"

    binary: dreadgoad

    dir: ./cli

    main: .

    ldflags:
      - -s -w
      - -X main.version={{.Summary}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

    goos:
      - linux
      - darwin

    goarch:
      - amd64
      - arm64

    hooks:
      pre:
        - cmd: go mod tidy
          dir: ./cli
